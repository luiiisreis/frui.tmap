<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FruitMap - Goiânia</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background: #f0f2f5; }
        #map { height: 60vh; width: 100%; }
        .header { padding: 15px; background: #2e7d32; color: white; text-align: center; }
        .controls { padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .btn { padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-scan { background: #ff9800; color: white; }
        #camera-container { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 2000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .capture-btn { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 70px; height: 70px; background: white; border-radius: 50%; border: 5px solid #ccc; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0;">FruitMap GYN</h2>
    <small>Conectando Quintais de Goiânia</small>
</div>

<div id="map"></div>

<div class="controls">
    <button class="btn btn-scan" onclick="startCamera()">📸 SCANEAR NOVA FRUTA</button>
</div>

<div id="camera-container">
    <video id="video" autoplay playsinline></video>
    <div class="capture-btn" onclick="saveToSupabase()"></div>
    <button onclick="stopCamera()" style="position:fixed; top:20px; right:20px; color:white; background:none; border:none; font-size:24px;">X</button>
</div>

<script>
    // CONFIGURAÇÃO SUPABASE
    const SUPABASE_URL = 'https://dcvrmdbgwjddkpzjtlkq.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_L7TOtZx76mq3g2N_cPMWFg_B1DpQ9rC';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // INICIALIZA MAPA (Goiânia)
    var map = L.map('map').setView([-16.6869, -49.2648], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // FUNÇÃO PARA SALVAR DADOS REAIS
    async function saveToSupabase() {
        const frutaNome = prompt("Qual fruta você encontrou?");
        const zap = prompt("Seu WhatsApp para contato:");
        
        if (frutaNome && zap) {
            const { data, error } = await _supabase
                .from('colheitas')
                .insert([
                    { fruta: frutaNome, whatsapp: zap, status: 'Identificado', lat: -16.6869, lng: -49.2648 }
                ]);

            if (error) {
                alert("Erro ao salvar: " + error.message);
            } else {
                alert("✅ SUCESSO!\n" + frutaNome + " foi mapeada em Goiânia.");
                location.reload(); // Recarrega para mostrar o novo ponto (em breve)
            }
        }
        stopCamera();
    }

    // LÓGICA DA CÂMERA
    const video = document.getElementById('video');
    const container = document.getElementById('camera-container');

    async function startCamera() {
        container.style.display = 'block';
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        video.srcObject = stream;
    }

    function stopCamera() {
        if (video.srcObject) {
            video.srcObject.getTracks().forEach(track => track.stop());
        }
        container.style.display = 'none';
    }
</script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</body>
</html>
