<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FruitMap GYN - Portal Oficial</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background: #f4f4f4; }
        #map { height: 70vh; width: 100%; border-bottom: 4px solid #2e7d32; }
        .header { padding: 10px; background: #2e7d32; color: white; text-align: center; }
        .footer-btns { padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .btn { padding: 15px; border-radius: 8px; border: none; font-weight: bold; font-size: 16px; cursor: pointer; text-transform: uppercase; }
        .btn-scan { background: #ff9800; color: white; box-shadow: 0 4px #e68a00; }
        #camera-container { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 9999; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .capture-circle { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 70px; height: 70px; background: white; border-radius: 50%; border: 5px solid #ccc; }
    </style>
</head>
<body>

<div class="header">
    <strong>PORTAL FRUITMAP GOIÂNIA</strong><br>
    <small>Toque nos ícones para ver as frutas disponíveis</small>
</div>

<div id="map"></div>

<div class="footer-btns">
    <button class="btn btn-scan" onclick="startCamera()">📸 CADASTRAR ÁRVORE AGORA</button>
</div>

<div id="camera-container">
    <video id="video" autoplay playsinline></video>
    <div class="capture-circle" onclick="saveData()"></div>
    <button onclick="stopCamera()" style="position:fixed; top:20px; right:20px; background:red; color:white; border:none; padding:10px; border-radius:5px;">SAIR</button>
</div>

<script>
    const SUPABASE_URL = 'https://dcvrmdbgwjddkpzjtlkq.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_L7TOtZx76mq3g2N_cPMWFg_B1DpQ9rC';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    var map = L.map('map').setView([-16.6869, -49.2648], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // FUNÇÃO QUE LÊ AS FRUTAS DO BANCO E PÕE NO MAPA
    async function carregarPontos() {
        const { data: frutas, error } = await _supabase.from('colheitas').select('*');
        if (frutas) {
            frutas.forEach(f => {
                L.marker([f.lat, f.lng])
                 .addTo(map)
                 .bindPopup(`<b>${f.fruta}</b><br>Zap: ${f.whatsapp}<br><a href="https://wa.me/55${f.whatsapp.replace(/\D/g,'')}" target="_blank" style="color:green; font-weight:bold;">Chamar no WhatsApp</a>`);
            });
        }
    }

    // Carrega os pontos assim que o site abre
    carregarPontos();

    async function saveData() {
        const nome = prompt("Nome da Fruta:");
        const zap = prompt("Seu WhatsApp (com DDD):");
        if(nome && zap) {
            const centro = map.getCenter();
            await _supabase.from('colheitas').insert([{ fruta: nome, whatsapp: zap, lat: centro.lat, lng: centro.lng }]);
            alert("Cadastrado com sucesso! Recarregue para ver no mapa.");
            location.reload();
        }
        stopCamera();
    }

    // Controle da Câmera
    async function startCamera() {
        document.getElementById('camera-container').style.display = 'block';
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        document.getElementById('video').srcObject = stream;
    }
    function stopCamera() {
        const video = document.getElementById('video');
        if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
        document.getElementById('camera-container').style.display = 'none';
    }
</script>
</body>
</html>
