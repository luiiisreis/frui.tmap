<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FruitMap - Goiânia</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; overflow-x: hidden; }
        .header { padding: 15px; background: #2e7d32; color: white; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        #map { height: 50vh; width: 100%; background: #e0e0e0; }
        .controls { padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .btn { padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn-scan { background: #ff9800; color: white; box-shadow: 0 4px 0 #e68a00; }
        .btn-scan:active { transform: translateY(2px); box-shadow: 0 2px 0 #e68a00; }
        
        #camera-container { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 2000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .capture-btn { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); width: 75px; height: 75px; background: white; border-radius: 50%; border: 5px solid #ccc; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0;">FruitMap GYN</h2>
    <small>Mapeando as Frutas de Goiânia</small>
</div>

<div id="map"></div>

<div class="controls">
    <button class="btn btn-scan" onclick="startCamera()">📸 SCANEAR NOVA FRUTA</button>
    <p style="text-align: center; color: #666; font-size: 14px;">Aponte para a árvore e clique no botão branco</p>
</div>

<div id="camera-container">
    <video id="video" autoplay playsinline></video>
    <div class="capture-btn" onclick="saveToSupabase()"></div>
    <button onclick="stopCamera()" style="position:fixed; top:20px; right:20px; color:white; background:rgba(0,0,0,0.5); border:none; border-radius: 50%; width: 40px; height: 40px; font-size:20px;">X</button>
</div>

<script>
    // 1. CONFIGURAÇÃO SUPABASE (Suas chaves)
    const SUPABASE_URL = 'https://dcvrmdbgwjddkpzjtlkq.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_L7TOtZx76mq3g2N_cPMWFg_B1DpQ9rC';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 2. INICIALIZA MAPA
    var map;
    function initMap() {
        // Focado em Goiânia
        map = L.map('map').setView([-16.6869, -49.2648], 13);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // Força o mapa a renderizar as peças corretamente
        setTimeout(function(){ map.invalidateSize(); }, 500);
    }

    // Chamar inicialização ao carregar
    window.onload = initMap;

    // 3. FUNÇÃO PARA SALVAR NO BANCO
    async function saveToSupabase() {
        const frutaNome = prompt("Qual fruta você identificou?");
        const zap = prompt("WhatsApp para interessados (Ex: 629...):");
        
        if (frutaNome && zap) {
            // Pegar localização aproximada do mapa para o teste
            const centro = map.getCenter();

            const { data, error } = await _supabase
                .from('colheitas')
                .insert([
                    { 
                        fruta: frutaNome, 
                        whatsapp: zap, 
                        status: 'Identificada', 
                        lat: centro.lat, 
                        lng: centro.lng 
                    }
                ]);

            if (error) {
                alert("Erro no Supabase: " + error.message);
            } else {
                alert("✅ BOA, LUIS!\n" + frutaNome + " guardada no banco de dados.");
                // Adiciona um marcador visual na hora
                L.marker([centro.lat, centro.lng]).addTo(map)
                 .bindPopup("<b>" + frutaNome + "</b><br>Zap: " + zap).openPopup();
            }
        }
        stopCamera();
    }

    // 4. LÓGICA DA CÂMERA
    const video = document.getElementById('video');
    const container = document.getElementById('camera-container');

    async function startCamera() {
        try {
            container.style.display = 'block';
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment" } 
            });
            video.srcObject = stream;
        } catch (err) {
            alert("Erro ao abrir câmera: " + err);
            container.style.display = 'none';
        }
    }

    function stopCamera() {
        if (video.srcObject) {
            video.srcObject.getTracks().forEach(track => track.stop());
        }
        container.style.display = 'none';
    }
</script>

</body>
</html>
