<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FruitMap GYN - Portal IA Oficial</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@2.1.0"></script>

    <style>
        body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; background: #fff; color: #333; }
        .header { padding: 15px; background: #2e7d32; color: white; text-align: center; }
        #map { height: 45vh; width: 100%; border-bottom: 4px solid #2e7d32; }
        .instrucoes { padding: 15px; background: #f9f9f9; }
        .instrucoes h3 { color: #2e7d32; margin-top: 0; font-size: 18px; }
        .passo { display: flex; align-items: flex-start; margin-bottom: 12px; font-size: 14px; }
        .numero { background: #2e7d32; color: white; border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; margin-right: 10px; flex-shrink: 0; font-weight: bold; font-size: 12px; }
        .footer-btns { padding: 15px; text-align: center; background: #fff; position: sticky; bottom: 0; }
        .btn { width: 100%; padding: 16px; border-radius: 10px; border: none; font-weight: bold; font-size: 18px; cursor: pointer; }
        .btn-scan { background: #ff9800; color: white; box-shadow: 0 4px #e68a00; }
        #camera-container { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 9999; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .capture-circle { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); width: 75px; height: 75px; background: white; border-radius: 50%; border: 5px solid #ccc; cursor: pointer; }
        #loading { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 18px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

<div class="header">
    <strong>PORTAL IA FRUITMAP GYN</strong><br>
    <small>A IA mapeando os Quintais de Goiânia</small>
</div>

<div id="map"></div>

<section class="instrucoes">
    <h3>COMO FUNCIONA A IA:</h3>
    <div class="passo"><div class="numero">1</div><div>Arraste o mapa até a árvore ficar no centro da tela.</div></div>
    <div class="passo"><div class="numero">2</div><div>Clique no botão e aponte a câmera para a fruta.</div></div>
    <div class="passo"><div class="numero">3</div><div>A IA vai tentar identificar a fruta e salvar no mapa!</div></div>
</section>

<div class="footer-btns">
    <button class="btn btn-scan" onclick="startCamera()">📸 IDENTIFICAR COM IA</button>
</div>

<div id="camera-container">
    <video id="video" autoplay playsinline></video>
    <div class="capture-circle" onclick="takePhotoAndClassify()"></div>
    <button onclick="stopCamera()" style="position:fixed; top:20px; right:20px; background:red; color:white; border:none; padding:10px; border-radius:5px; z-index: 10000;">SAIR</button>
    <div id="loading">IDENTIFICANDO FRUTA...<br><small>(aguarde uns segundos)</small></div>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
    // Configurações Supabase (Suas chaves)
    const SUPABASE_URL = 'https://dcvrmdbgwjddkpzjtlkq.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_L7TOtZx76mq3g2N_cPMWFg_B1DpQ9rC';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    var map = L.map('map').setView([-16.6869, -49.2648], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // Carregar Modelo de IA ao iniciar
    let model;
    async function loadModel() {
        console.log("Carregando modelo de IA...");
        model = await mobilenet.load();
        console.log("Modelo carregado!");
    }
    loadModel();

    async function carregarPontos() {
        const { data: frutas } = await _supabase.from('colheitas').select('*');
        if (frutas) {
            frutas.forEach(f => {
                L.marker([f.lat, f.lng]).addTo(map)
                 .bindPopup(`<b>${f.fruta} (IA)</b><br>Zap: ${f.whatsapp}<br><a href="https://wa.me/55${f.whatsapp.replace(/\D/g,'')}" target="_blank" style="color:green; font-weight:bold;">Chamar no Zap</a>`);
            });
        }
    }
    carregarPontos();

    // LÓGICA DA CÂMERA E IA
    const video = document.getElementById('video');
    const cameraContainer = document.getElementById('camera-container');
    const loading = document.getElementById('loading');
    const canvas = document.getElementById('canvas');

    async function startCamera() {
        cameraContainer.style.display = 'block';
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        video.srcObject = stream;
    }

    async function takePhotoAndClassify() {
        if (!model) { alert("Aguarde, a IA ainda está carregando."); return; }
        
        // 1. Mostrar carregamento e travar o clique
        loading.style.display = 'block';
        document.querySelector('.capture-circle').style.pointerEvents = 'none';

        // 2. Capturar a foto do vídeo para o canvas
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);

        // 3. Deixar a IA rodar no canvas
        const predictions = await model.classify(canvas);
        
        // 4. Parar carregamento
        loading.style.display = 'none';
        document.querySelector('.capture-circle').style.pointerEvents = 'auto';

        // 5. Analisar o resultado
        if (predictions && predictions.length > 0) {
            // Pegar o primeiro resultado (o mais provável)
            const topFruta = predictions[0].className.split(',')[0]; // Pega só o primeiro nome
            const certeza = (predictions[0].probability * 100).toFixed(0);

            // 6. Perguntar para confirmar (pode vir em inglês)
            const frutaConfirmada = prompt(`A IA acha que é: **${topFruta}** (${certeza}% de certeza).\nDigite o nome correto da fruta (ou mude se estiver errado):`, topFruta);
            
            // 7. Seguir para o WhatsApp e Salvar (igual antes)
            if (frutaConfirmada) {
                const zap = prompt("Seu WhatsApp (com DDD):");
                if(zap) {
                    const centro = map.getCenter();
                    const { error } = await _supabase.from('colheitas').insert([{ 
                        fruta: frutaConfirmada, 
                        whatsapp: zap, 
                        lat: centro.lat, 
                        lng: centro.lng, 
                        status: 'Ativo' 
                    }]);
                    
                    if(!error) {
                        alert("✅ SUCESSO! A IA mapeou a árvore.");
                        location.reload();
                    } else { alert("Erro ao salvar. Verifique a conexão."); }
                }
            }
        } else { alert("A IA não conseguiu identificar a fruta. Tente de novo."); }
        
        stopCamera();
    }

    function stopCamera() {
        if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
        cameraContainer.style.display = 'none';
        loading.style.display = 'none';
        document.querySelector('.capture-circle').style.pointerEvents = 'auto';
    }
</script>
</body>
</html>
